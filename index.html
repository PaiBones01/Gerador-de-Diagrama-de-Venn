<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Diagrama de Venn</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="editor">
    <h2>Configurações</h2>
    <label>Conjuntos:</label>
    <textarea id="conjuntos" rows="6" placeholder="Exemplo:
A = {5,3,6}
B = {5,8,10}
C = {2,3}"></textarea><br><br>

    <button onclick="gerarDiagrama()">Gerar Diagrama</button>
    <button onclick="baixarImagem()">Baixar Imagem</button>
  </div>

  <div id="canvas-container">
    <canvas id="vennCanvas"></canvas>
  </div>

  <script src="script.js"></script>
</body>
</html>
